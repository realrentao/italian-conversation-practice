  bookData.chapters.forEach(ch=>{
    h+='<div class="chapter-group"><div class="chapter-title" onclick="toggleChapter(this)"><span>'+ch.title+'<br><small style="font-weight:400;opacity:.6;font-size:13px">'+ch.subtitle+'</small></span><span class="arrow">&#9660;</span></div><ul class="unit-list">';
    ch.units.forEach(u=>{h+='<li class="unit-item" data-unit="'+u.id+'" onclick="openUnit(\''+u.id+'\')"><span class="unit-num">'+u.num+'</span>'+u.title+'<br><small style="opacity:.5;font-size:13px">'+u.subtitle+'</small></li>'});
    h+='</ul></div>';
  });
  c.innerHTML=h;
}

function toggleChapter(el){el.classList.toggle('collapsed');el.nextElementSibling.classList.toggle('collapsed')}
function filterTOC(q){q=q.toLowerCase().trim();document.querySelectorAll('.unit-item').forEach(el=>{el.style.display=(!q||el.textContent.toLowerCase().includes(q))?'':'none'})}

// ====== RENDER UNIT ======
function buildUnit(u){
  let h='<div class="unit-content" id="uc-'+u.id+'">';
  h+='<div class="unit-header"><div class="label">'+u.num+'</div><h2>'+u.title+'</h2><div class="sub">'+u.subtitle+'</div><div class="scene">'+u.scene+'</div></div>';
  h+='<div class="section-title">VOCABOLARIO <span class="it">/'+unitNameMap[u.id]+'词汇/</span></div><div class="vocab-grid">';
  u.vocab.forEach((v,i)=>{h+='<div class="vocab-item" onclick="speakWord(\''+u.id+'\',\'v_'+i+'\',this.querySelector(\'.play-icon\'))"><span class="play-icon">&#9654;</span><span class="it">'+v.it+'</span><span class="zh">'+v.zh+'</span></div>'});
  h+='</div>';
  h+='<div class="section-title">DIALOGO <span class="it">/'+unitNameMap[u.id]+'对话/</span></div><div class="dialogue-section"><div class="audio-controls"><button class="audio-btn play-all" onclick="playAll(\''+u.id+'\')" id="playAll-'+u.id+'">&#x1F50A; 播放全部</button><button class="audio-btn stop-btn" onclick="stopSpeech()">&#x23F9; 停止</button><button class="audio-btn speed-control" onclick="toggleSpeed(\''+u.id+'\')" id="speedBtn-'+u.id+'">&#x1F422; 常速 1.0x</button></div><div class="progress-bar"><div class="fill" id="progress-'+u.id+'"></div></div>';
  u.dialogue.forEach((d,i)=>{
    const sc=d.speaker==='A'?'speaker':'speaker speaker-b';
    h+='<div class="dialogue-line" onclick="speakLine(this,'+i+')" data-unit="'+u.id+'" data-idx="'+i+'"><span class="'+sc+'">'+d.name+'</span><div class="text-wrapper"><div class="it">'+d.text+'</div><div class="zh">'+d.zh+'</div></div><button class="line-play">&#9654;</button></div>';
  });
  h+='</div>';
  h+='<div class="section-title">GRAMMATICA <span class="it">/'+unitNameMap[u.id]+'语法/</span></div><div class="grammar-grid">';
  u.grammar.forEach(g=>{h+='<div class="grammar-item"><div class="rule">'+g.rule+'</div><div class="explain">'+g.explain+'</div><div class="example">'+g.example+'</div></div>'});
  h+='</div>';
  h+='<div class="section-title">FRASI UTILI <span class="it">/'+unitNameMap[u.id]+'常用句/</span></div><div class="sent-grid">';
  u.sentences.forEach((s,i)=>{h+='<div class="sentence-item" onclick="speakWord(\''+u.id+'\',\'s_'+i+'\',this.querySelector(\'.s-play\'))"><div class="s-text"><div class="it">'+s.it+'</div><div class="zh">'+s.zh+'</div></div><button class="s-play">&#9654;</button></div>'});
  h+='</div></div>';
  return h;
}
unitNameMap={};
bookData.chapters.forEach(ch=>ch.units.forEach(u=>{unitNameMap[u.id]=u.num}));

// ====== AUDIO ======
let audioCache={},currentAudio=null,isPlaying=false,isDialogAudio=false;
let dialogSpeechRate={},playAllQueue=null,activePlayBtn=null;

function toggleSpeed(u){
  const btn=document.getElementById('speedBtn-'+u);
  const cur=dialogSpeechRate[u]||1.0;
  if(cur===1.0){dialogSpeechRate[u]=1.4;btn.textContent='&#x1F680; 快速 1.4x';btn.classList.add('active')}
  else{dialogSpeechRate[u]=1.0;btn.textContent='&#x1F422; 常速 1.0x';btn.classList.remove('active')}
  if(currentAudio&&isDialogAudio)currentAudio.playbackRate=dialogSpeechRate[u];
}

function loadAudio(u,cb){
  if(audioCache[u]&&Object.keys(audioCache[u]).length>0){if(cb)cb();return}
  if(window.AD&&window.AD[u]&&Object.keys(window.AD[u]).length>0){audioCache[u]=window.AD[u];if(cb)cb();return}
  const s=document.createElement('script');
  s.src='audio_data/audio_'+u+'.js';
  s.onload=function(){if(window.AD&&window.AD[u]&&Object.keys(window.AD[u]).length>0)audioCache[u]=window.AD[u];if(cb)cb()};
  s.onerror=function(){if(window.AD&&window.AD[u])audioCache[u]=window.AD[u];if(cb)cb()};
  document.body.appendChild(s);
}

function stopSpeech(){
  if(currentAudio){try{currentAudio.pause()}catch(e){}currentAudio=null;isPlaying=false}
  if(playAllQueue){clearTimeout(playAllQueue);playAllQueue=null}
  resetPlayButtons();
}

function resetPlayButtons(){
  document.querySelectorAll('.play-icon,.s-play,.line-play').forEach(el=>{el.textContent='▶';el.style.background='';el.classList.remove('playing')});
  document.querySelectorAll('.play-all').forEach(el=>{el.textContent='🔊 播放全部';el.classList.remove('playing')});
  if(activePlayBtn){activePlayBtn.textContent='▶';activePlayBtn.style.background='';activePlayBtn.classList.remove('playing');activePlayBtn=null}
}

function setButtonPlaying(btn){if(!btn)return;btn.textContent='⏸';btn.style.background='#00e5ff';btn.style.color='#fff';btn.classList.add('playing');activePlayBtn=btn}

function base64ToBlobUrl(b64){
  try{const bs=atob(b64);const b=new ArrayBuffer(bs.length);const v=new Uint8Array(b);for(let i=0;i<bs.length;i++)v[i]=bs.charCodeAt(i);return URL.createObjectURL(new Blob([b],{type:'audio/mpeg'}))}catch(e){return null}
}

function ensureAudioCtx(){
  if(window.audioCtx&&window.audioCtx.state!=='closed')return window.audioCtx;
  window.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return window.audioCtx;
}

let blobCache={};

function playBase64Audio(data,callback,btnEl,highlightEl,rate){
  if(currentAudio){stopSpeech()}
  if(!data)return;
  const ctx=ensureAudioCtx();
  try{
    const bs=atob(data);const ab=new ArrayBuffer(bs.length);const v=new Uint8Array(ab);
    for(let i=0;i<bs.length;i++)v[i]=bs.charCodeAt(i);
    ctx.decodeAudioData(ab,function(buf){
      const source=ctx.createBufferSource();source.buffer=buf;
      if(rate)source.playbackRate.value=rate;
      const gain=ctx.createGain();gain.gain.value=1;
      source.connect(gain);gain.connect(ctx.destination);
      source.start(0);currentAudio=source;isPlaying=true;
      if(btnEl)setButtonPlaying(btnEl);
      if(highlightEl){document.querySelectorAll('.active-line').forEach(e=>e.classList.remove('active-line'));highlightEl.classList.add('active-line')}
      source.onended=function(){
        currentAudio=null;isPlaying=false;resetPlayButtons();
        if(callback)callback();
      };
    },function(){if(callback)callback()});
  }catch(e){if(callback)callback()}
}

function speakWord(u,key,btn){
  stopSpeech();isDialogAudio=false;
  loadAudio(u,function(){
    const d=audioCache[u]?.[key];
    if(d)playBase64Audio(d,null,btn);
  });
}

function speakLine(el,i){
  const u=el.dataset.unit,unit=findUnit(u);
  if(!unit)return;
  const d=unit.dialogue[i];if(!d)return;
  stopSpeech();
  document.querySelectorAll('.active-line').forEach(e=>e.classList.remove('active-line'));
  el.classList.add('active-line');
  loadAudio(u,function(){
    const key='d_'+i,data=audioCache[u]?.[key];
    if(!data)return;
    const btn=el.querySelector('.line-play');isDialogAudio=true;
    const rate=dialogSpeechRate[u]||1.0;
    playBase64Audio(data,function(){el.classList.remove('active-line')},btn,null,rate);
  });
}

function playAll(u){
  const unit=findUnit(u);if(!unit)return;
  const btn=document.getElementById('playAll-'+u);
  const pb=document.getElementById('progress-'+u);
  if(isPlaying){stopSpeech();return}
  var _lines,_i=0;
  loadAudio(u,function(){
    _lines=document.querySelectorAll('#uc-'+u+' .dialogue-line');_i=0;
    btn.textContent='⏸ 播放中...';btn.classList.add('playing');
    isDialogAudio=true;playAllQueue=setTimeout(playNext,100);
  });
  function playNext(){
    if(_i>=unit.dialogue.length){stopSpeech();return}
    pb.style.width=((_i+1)/unit.dialogue.length*100)+'%';
    const key='d_'+_i,data=audioCache[u]?.[key],rate=dialogSpeechRate[u]||1.0;
    if(!data){_i++;playAllQueue=setTimeout(playNext,100);return}
    playBase64Audio(data,function(){_i++;playAllQueue=setTimeout(playNext,300)},null,_lines[_i],rate);
  }
}

function findUnit(id){
  for(const ch of bookData.chapters)for(const u of ch.units)if(u.id===id)return u;
  return null;
}

// ====== NAVIGATION ======
function openUnit(id){
  if(!audioCache[id]||Object.keys(audioCache[id]).length===0){
    if(window.AD&&window.AD[id])audioCache[id]=window.AD[id];
    else{const s=document.createElement('script');s.src='audio_data/audio_'+id+'.js';s.onload=function(){if(window.AD&&window.AD[id]&&Object.keys(window.AD[id]).length>0)audioCache[id]=window.AD[id]};document.body.appendChild(s)}
  }
  document.querySelectorAll('.unit-content').forEach(e=>e.classList.remove('active'));
  document.getElementById('welcomePanel').style.display='none';
  const container=document.getElementById('unitContentContainer');
  let target=document.getElementById('uc-'+id);
  if(!target){const u=findUnit(id);if(u){const d=document.createElement('div');d.innerHTML=buildUnit(u);while(d.firstChild)container.appendChild(d.firstChild);target=document.getElementById('uc-'+id)}}
  if(target){target.classList.add('active');target.scrollIntoView({behavior:'smooth',block:'start'})}
  document.querySelectorAll('.unit-item').forEach(e=>e.classList.remove('active'));
  const ti=document.querySelector('[data-unit="'+id+'"]');
  if(ti){ti.classList.add('active');const ch=ti.closest('.unit-list');if(ch)ch.classList.remove('collapsed');const t=ch?.previousElementSibling;if(t)t.classList.remove('collapsed')}
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
document.getElementById('sidebarOverlay').onclick=toggleSidebar;

// ====== PRELOAD ======
let _preloadIdx=0,_preloadIds=[];
function startPreload(){
  if(_preloadIds.length===0)bookData.chapters.forEach(ch=>ch.units.forEach(u=>_preloadIds.push(u.id)));
  for(let c=0;c<6;c++)loadNext();
}
function loadNext(){
  if(_preloadIdx>=_preloadIds.length)return;
  const u=_preloadIds[_preloadIdx++];
  if(audioCache[u]&&Object.keys(audioCache[u]).length>0){loadNext();return}
  if(window.AD&&window.AD[u]){audioCache[u]=window.AD[u];loadNext();return}
  const s=document.createElement('script');s.src='audio_data/audio_'+u+'.js';
  s.onload=function(){if(window.AD&&window.AD[u]&&Object.keys(window.AD[u]).length>0)audioCache[u]=window.AD[u];loadNext()};
  s.onerror=function(){if(window.AD&&window.AD[u])audioCache[u]=window.AD[u];loadNext()};
  document.body.appendChild(s);
}

// ====== INIT ======
function init(){
  buildTOC();
  if(bookData.chapters.length>0&&bookData.chapters[0].units.length>0)openUnit(bookData.chapters[0].units[0].id);
  setTimeout(startPreload,0);
}
init();
</script>
