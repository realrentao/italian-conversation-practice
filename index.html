<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实用意大利语会话 — 交互式学习工具</title>
<style>
/* ====== CSS Variables & Theme ====== */
:root {
  --green: #009246;
  --white: #FFFFFF;
  --red: #CE2B37;
  --cream: #FFF8F0;
  --warm-bg: #FFF5EB;
  --dark: #1a1a2e;
  --text: #2d2d44;
  --gray: #f0ece6;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(.4,0,.2,1);
  --sidebar-width: 320px;
  --accent: #CE2B37;
  --accent-light: #ffe8e8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--warm-bg);
  color: var(--text);
  line-height: 1.7;
  display: flex;
  min-height: 100vh;
}

/* ====== Sidebar ====== */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: var(--white);
  border-right: 1px solid #eee;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  transform: translateX(0);
  transition: transform var(--transition);
}

.sidebar-header {
  background: linear-gradient(135deg, var(--green), #00a85a);
  color: var(--white);
  padding: 24px 20px;
  flex-shrink: 0;
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
}

.sidebar-header .subtitle {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 4px;
}

.flag-bar {
  display: flex;
  height: 4px;
}
.flag-bar span {
  flex: 1;
}
.flag-bar .green { background: var(--green); }
.flag-bar .white { background: var(--white); }
.flag-bar .red { background: var(--red); }

.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid #eee;
}
.sidebar-search input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  transition: border var(--transition);
}
.sidebar-search input:focus {
  border-color: var(--red);
}

.sidebar-toc {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.chapter-group {
  margin-bottom: 4px;
}

.chapter-title {
  padding: 10px 20px;
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
.chapter-title:hover { background: var(--gray); }
.chapter-title .arrow {
  transition: transform var(--transition);
  font-size: 10px;
}
.chapter-title.collapsed .arrow { transform: rotate(-90deg); }

.unit-list {
  list-style: none;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.unit-list.collapsed { max-height: 0 !important; }

.unit-item {
  padding: 8px 20px 8px 32px;
  font-size: 16px;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid transparent;
}
.unit-item:hover {
  background: var(--accent-light);
  color: var(--red);
}
.unit-item.active {
  background: var(--accent-light);
  border-left-color: var(--red);
  color: var(--red);
  font-weight: 600;
}
.unit-item .unit-num {
  font-size: 14px;
  opacity: 0.6;
  display: block;
}

/* ====== Main Content ====== */
.main {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
  padding: 0;
}

.mobile-header {
  display: none;
  position: sticky;
  top: 0;
  z-index: 999;
  background: linear-gradient(135deg, var(--green), #00a85a);
  color: white;
  padding: 12px 16px;
  align-items: center;
  gap: 12px;
}
.mobile-header .menu-btn {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  padding: 4px;
}
.mobile-header h2 {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}

.hero {
  background: linear-gradient(135deg, var(--green), #00a85a, var(--red));
  padding: 60px 40px 40px;
  color: var(--white);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
  animation: heroFloat 20s linear infinite;
}
@keyframes heroFloat {
  0% { transform: translate(0,0); }
  50% { transform: translate(-20px,-20px); }
  100% { transform: translate(0,0); }
}
.hero h1 {
  font-size: 32px;
  font-weight: 800;
  position: relative;
  z-index: 1;
}
.hero p {
  font-size: 14px;
  opacity: 0.9;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}
.hero .flag-mini {
  display: inline-flex;
  gap: 6px;
  margin-top: 16px;
  position: relative;
  z-index: 1;
}
.hero .flag-mini span {
  width: 40px;
  height: 24px;
  border-radius: 4px;
}
.hero .flag-mini .green { background: var(--green); }
.hero .flag-mini .white { background: var(--white); }
.hero .flag-mini .red { background: var(--red); }

.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ====== Unit Content ====== */
.unit-content {
  display: none;
  animation: fadeIn 0.4s ease;
}
.unit-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.unit-title-block {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--gray);
}
.unit-title-block .chapter-label {
  font-size: 12px;
  color: var(--green);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.unit-title-block h2 {
  font-size: 26px;
  margin-top: 4px;
  color: var(--dark);
}
.unit-title-block .unit-subtitle {
  font-size: 15px;
  color: #888;
  margin-top: 4px;
}

/* ====== Scene Intro ====== */
.scene-intro {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--green);
}
.scene-intro h3 {
  font-size: 18px;
  color: var(--green);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.scene-intro p {
  font-size: 17px;
  color: #555;
}

/* ====== Vocabulary ====== */
.vocab-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--red);
}
.vocab-section h3 {
  font-size: 15px;
  color: var(--red);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.vocab-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.vocab-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--cream);
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: all var(--transition);
}
.vocab-item:hover {
  background: var(--accent-light);
}
.vocab-item .it {
  font-weight: 600;
  color: var(--dark);
  font-style: italic;
}
.vocab-item .sep {
  color: #ccc;
}
.vocab-item .zh {
  color: #666;
}
.vocab-item .play-icon {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--green);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  transition: transform var(--transition);
}
.vocab-item:hover .play-icon {
  transform: scale(1.15);
}

/* ====== Dialogue ====== */
.dialogue-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.dialogue-section h3 {
  font-size: 15px;
  color: var(--dark);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.audio-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.audio-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: none;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.audio-btn:active { transform: scale(0.96); }
.audio-btn.play-all {
  background: var(--green);
  color: white;
}
.audio-btn.play-all:hover { background: #008040; }
.audio-btn.play-all.playing { background: var(--red); }
.audio-btn.speed-control {
  background: var(--gray);
  color: var(--dark);
}
.audio-btn.speed-control:hover { background: #ddd; }
.audio-btn.speed-control.active {
  background: var(--red);
  color: white;
}
.audio-btn.stop-btn {
  background: #eee;
  color: #999;
}
.audio-btn.stop-btn:hover { background: #ddd; color: var(--red); }

.dialogue-line {
  display: flex;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 4px;
  transition: all var(--transition);
  cursor: pointer;
}
.dialogue-line:hover { background: var(--cream); }
.dialogue-line.active-line {
  background: var(--accent-light);
  border-left: 3px solid var(--red);
}
.dialogue-line .speaker {
  font-weight: 700;
  color: var(--red);
  width: 130px;
  font-size: 15px;
  flex-shrink: 0;
}
.dialogue-line .speaker.speaker-b {
  color: var(--green);
}
.dialogue-line .text-wrapper {
  flex: 1;
}
.dialogue-line .text-wrapper .it {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.6;
}
.dialogue-line .text-wrapper .zh {
  font-size: 15px;
  color: #888;
  margin-top: 2px;
}
.dialogue-line .line-play {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--gray);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--green);
  font-size: 12px;
  flex-shrink: 0;
  align-self: center;
  transition: all var(--transition);
}
.dialogue-line .line-play:hover {
  background: var(--green);
  color: white;
}
.dialogue-line .line-play.playing {
  background: var(--red) !important;
  color: white !important;
}

/* ====== Grammar Notes ====== */
.grammar-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border-left: 4px solid #f4a261;
}
.grammar-section h3 {
  font-size: 15px;
  color: #e76f51;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.grammar-item {
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
}
.grammar-item:last-child { border-bottom: none; }
.grammar-item .rule {
  font-weight: 600;
  color: var(--dark);
  font-size: 16px;
}
.grammar-item .explain {
  font-size: 15px;
  color: #666;
  margin-top: 2px;
}
.grammar-item .example {
  font-size: 15px;
  color: var(--red);
  font-style: italic;
  margin-top: 2px;
}

/* ====== Common Sentences ====== */
.sentences-section {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--green);
}
.sentences-section h3 {
  font-size: 15px;
  color: var(--green);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sentence-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background var(--transition);
}
.sentence-item:hover { background: var(--cream); }
.sentence-item:last-child { border-bottom: none; }
.sentence-item .s-text {
  flex: 1;
}
.sentence-item .s-text .it {
  font-weight: 500;
  font-size: 18px;
}
.sentence-item .s-text .zh {
  font-size: 16px;
  color: #888;
}
.sentence-item .s-play {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--gray);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--green);
  flex-shrink: 0;
  transition: all var(--transition);
}
.sentence-item .s-play:hover {
  background: var(--green);
  color: white;
}

/* ====== Progress Bar ====== */
.progress-bar {
  height: 4px;
  background: var(--gray);
  border-radius: 2px;
  margin: 16px 0;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--red));
  width: 0%;
  transition: width 0.3s;
  border-radius: 2px;
}

/* ====== Book Info Panel ====== */
.book-info {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  text-align: center;
  max-width: 600px;
  margin: 40px auto;
}
.book-info h2 { color: var(--dark); margin-bottom: 8px; }
.book-info p { font-size: 14px; color: #666; margin-bottom: 4px; }
.book-info .isbn { font-size: 12px; color: #aaa; margin-top: 12px; }
.book-info .flag-row { display: flex; justify-content: center; gap: 8px; margin: 16px 0; }
.book-info .flag-row span { width: 50px; height: 30px; border-radius: 4px; }

/* ====== Overlay ====== */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}
.sidebar-overlay.show { display: block; }

/* ====== Scrollbar ====== */
.sidebar-toc::-webkit-scrollbar { width: 4px; }
.sidebar-toc::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* ====== Responsive ====== */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main {
    margin-left: 0;
  }
  .mobile-header {
    display: flex;
  }
  .hero {
    padding: 32px 20px 28px;
  }
  .hero h1 {
    font-size: 24px;
  }
  .content {
    padding: 20px 12px 60px;
  }
  .vocab-grid {
    grid-template-columns: 1fr;
  }
  .unit-title-block h2 {
    font-size: 20px;
  }
  .dialogue-line {
    padding: 8px 10px;
    flex-wrap: wrap;
    position: relative;
  }
  .dialogue-line .speaker {
    width: 100%;
    font-size: 16px;
    margin-bottom: 2px;
    padding-bottom: 2px;
  }
  .dialogue-line .text-wrapper {
    width: calc(100% - 36px);
    flex: none;
  }
  .dialogue-line .text-wrapper .it {
    font-size: 16px;
  }
  .dialogue-line .line-play {
    position: absolute;
    right: 10px;
    bottom: 12px;
  }
}

@media (max-width: 480px) {
  .audio-controls {
    flex-direction: column;
  }
  .audio-btn {
    justify-content: center;
  }
}

/* ====== Print ====== */
@media print {
  .sidebar, .mobile-header, .audio-controls { display: none; }
  .main { margin-left: 0; }
  .unit-content { display: block !important; page-break-before: always; }
}
</style>
</head>
<body>

<!-- ====== Sidebar Overlay ====== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ====== Sidebar ====== -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>实用意大利语会话</h1>
    <div class="subtitle">Conversazioni Reali in Italiano</div>
  </div>
  <div class="flag-bar">
    <span class="green"></span>
    <span class="white"></span>
    <span class="red"></span>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜索章节 / Cerca..." oninput="filterTOC(this.value)">
  </div>
  <div class="sidebar-toc" id="tocContainer">
    <!-- TOC will be populated by JS -->
  </div>
</nav>

<!-- ====== Main Content ====== -->
<div class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h2>实用意大利语会话</h2>
  </div>

  <div class="hero">
    <h1>实用意大利语会话</h1>
    <p>Conversazioni Reali in Italiano per Studenti Cinesi</p>
    <div class="flag-mini">
      <span class="green"></span>
      <span class="white"></span>
      <span class="red"></span>
    </div>
  </div>

  <div class="content" id="contentArea">
    <!-- Welcome / Info -->
    <div id="welcomePanel" class="book-info">
      <div class="flag-row">
        <span class="green" style="background:var(--green)"></span>
        <span class="white" style="background:var(--white);border:1px solid #ddd"></span>
        <span class="red" style="background:var(--red)"></span>
      </div>
      <h2>📖 实用意大利语会话</h2>
      <p style="margin-top:12px;font-size:16px;color:#888">
        以日常生活中常见的饮食、交通、游览和社交等主题为线索，<br>
        以实景会话的形式呈现意大利人的真实日常对话。
      </p>
      <p style="margin-top:12px;color:var(--green);font-weight:600;font-size:16px">
        点击左侧目录选择单元开始学习 👈
      </p>
    </div>

    <!-- Unit content will be injected by JS -->
    <div id="unitContentContainer"></div>
  </div>
</div>

<script async src="audio_data/audio_all.js"></script>
<script>
// ====== BOOK DATA ======
const bookData = {
  chapters: [
    {
      title: "All'arrivo in Italia",
      subtitle: "初到意大利",
      units: [
        {
          id: "c1u1",
          num: "第1单元",
          title: "Affittare una casa",
          subtitle: "租房",
          scene: "Mario è appena arrivato in Italia per studiare. Deve trovare un appartamento. Oggi va a vedere una casa in affitto nel centro di Roma con l'agente immobiliare, la signora Rossi.",
          vocab: [
            { it: "l'affitto", zh: "租金" },
            { it: "la casa", zh: "房子" },
            { it: "l'appartamento", zh: "公寓" },
            { it: "la stanza", zh: "房间" },
            { it: "il bagno", zh: "浴室" },
            { it: "la cucina", zh: "厨房" },
            { it: "il soggiorno", zh: "客厅" },
            { it: "la camera da letto", zh: "卧室" },
            { it: "l'agente immobiliare", zh: "房产中介" },
            { it: "il contratto", zh: "合同" },
            { it: "la caparra", zh: "押金" },
            { it: "le spese condominiali", zh: "物业费" }
          ],
          dialogue: [
            { speaker: "A", name: "Agente", text: "Buongiorno, signor Mario. Benvenuto! Questa è la casa in via Cavour.", zh: "早上好，马里奥先生。欢迎！这就是位于卡武尔街的房子。" },
            { speaker: "B", name: "Mario", text: "Buongiorno, signora Rossi. L'appartamento è molto luminoso!", zh: "早上好，罗西女士。这间公寓很明亮！" },
            { speaker: "A", name: "Agente", text: "Sì, ha tre stanze: un soggiorno, una camera da letto e una cucina abitabile.", zh: "是的，有三个房间：一个客厅、一间卧室和一个可居住的厨房。" },
            { speaker: "B", name: "Mario", text: "Quanto è l'affitto?", zh: "租金是多少？" },
            { speaker: "A", name: "Agente", text: "L'affitto è di 800 euro al mese, più 100 euro di spese condominiali.", zh: "租金是每月800欧元，外加100欧元的物业费。" },
            { speaker: "B", name: "Mario", text: "È inclusa l'acqua e il gas?", zh: "包含水和燃气吗？" },
            { speaker: "A", name: "Agente", text: "Sì, tutto incluso. Deve solo pagare la luce e internet.", zh: "是的，全包。您只需要支付电费和网络费。" },

            { it: "Potrebbe chiamarmi un taxi per l'aeroporto?", zh: "可以帮我叫一辆去机场的出租车吗？" }
          ]
        }
      ]
    }
  ]
};

// ====== BUILD TOC ======
function buildTOC() {
  const container = document.getElementById('tocContainer');
  let html = '';
  bookData.chapters.forEach((ch, ci) => {
    html += `<div class="chapter-group">`;
    html += `<div class="chapter-title" onclick="toggleChapter(this)">
      <span>${ch.title}<br><small style="font-weight:400;text-transform:none;letter-spacing:0;color:#666;font-size:14px">${ch.subtitle}</small></span>
      <span class="arrow">▼</span>
    </div>`;
    html += `<ul class="unit-list">`;
    ch.units.forEach((u) => {
      html += `<li class="unit-item" data-unit="${u.id}" onclick="openUnit('${u.id}')">
        <span class="unit-num">${u.num}</span>
        ${u.title}
        <br><small style="color:#999;font-size:14px">${u.subtitle}</small>
      </li>`;
    });
    html += `</ul></div>`;
  });
  container.innerHTML = html;
}

function toggleChapter(el) {
  el.classList.toggle('collapsed');
  const list = el.nextElementSibling;
  list.classList.toggle('collapsed');
}

function filterTOC(query) {
  const items = document.querySelectorAll('.unit-item');
  const q = query.toLowerCase().trim();
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

// ====== BUILD UNIT CONTENT ======
function buildUnitContent(unit) {
  let html = `<div class="unit-content" id="uc-${unit.id}">`;

  // Title
  html += `<div class="unit-title-block">
    <div class="chapter-label">${unit.num}</div>
    <h2>${unit.title}</h2>
    <div class="unit-subtitle">${unit.subtitle}</div>
  </div>`;

  // Scene Intro
  html += `<div class="scene-intro">
    <h3>🎬 场景介绍 / Scena</h3>
    <p>${unit.scene}</p>
  </div>`;

  // Vocabulary
  let vocabHtml = '';
  unit.vocab.forEach((v, vi) => {
    vocabHtml += `<div class="vocab-item" onclick="speakWord('${unit.id}', 'v_${vi}', this.querySelector('.play-icon'))">
      <span class="play-icon">▶</span>
      <span class="it">${v.it}</span>
      <span class="sep">/</span>
      <span class="zh">${v.zh}</span>
    </div>`;
  });
  html += `<div class="vocab-section">
    <h3>📝 关键词 / Parole Chiave</h3>
    <div class="vocab-grid">${vocabHtml}</div>
  </div>`;

  // Dialogue
  let diaHtml = '';
  unit.dialogue.forEach((d, i) => {
    const speakerClass = d.speaker === 'A' ? 'speaker' : 'speaker speaker-b';
    diaHtml += `<div class="dialogue-line" onclick="speakLine(this, ${i})" data-unit="${unit.id}" data-idx="${i}">
      <span class="${speakerClass}">${d.name}</span>
      <div class="text-wrapper">
        <div class="it">${d.text}</div>
        <div class="zh">${d.zh}</div>
      </div>
      <button class="line-play">▶</button>
    </div>`;
  });
  html += `<div class="dialogue-section">
    <h3>💬 对话 / Dialogo</h3>
    <div class="audio-controls">
      <button class="audio-btn play-all" onclick="playAll('${unit.id}')" id="playAll-${unit.id}">🔊 播放全部</button>
      <button class="audio-btn stop-btn" onclick="stopSpeech()">⏹ 停止</button>
      <button class="audio-btn speed-control" onclick="toggleSpeed('${unit.id}')" id="speedBtn-${unit.id}">🐢 常速 1.0x</button>
    </div>
    <div class="progress-bar"><div class="fill" id="progress-${unit.id}"></div></div>
    ${diaHtml}
  </div>`;

  // Grammar
  let gramHtml = '';
  unit.grammar.forEach(g => {
    gramHtml += `<div class="grammar-item">
      <div class="rule">📌 ${g.rule}</div>
      <div class="explain">${g.explain}</div>
      <div class="example"><em>${g.example}</em></div>
    </div>`;
  });
  html += `<div class="grammar-section">
    <h3>📖 语法解析 / Analisi Grammaticale</h3>
    ${gramHtml}
  </div>`;

  // Common Sentences
  let sentHtml = '';
  unit.sentences.forEach((s, si) => {
    sentHtml += `<div class="sentence-item" onclick="speakWord('${unit.id}', 's_${si}', this.querySelector('.s-play'))">
      <div class="s-text">
        <div class="it">${s.it}</div>
        <div class="zh">${s.zh}</div>
      </div>
      <button class="s-play">▶</button>
    </div>`;
  });
  html += `<div class="sentences-section">
    <h3>⭐ 常用句 / Frasi Utili</h3>
    ${sentHtml}
  </div>`;

  html += `</div>`;
  return html;
}

// ====== AUDIO PLAYBACK (edge-tts base64) ======
let audioCache = {};
let currentAudio = null;
let isPlaying = false;
let isDialogAudio = false; // 当前播放的是否为对话音频（仅对话响应实时变速）
let dialogSpeechRate = {}; // per-unit dialog speech rate, defaults to 1.0
let playAllQueue = null;
let activePlayBtn = null; // currently highlighted play button

function toggleSpeed(unitId) {
  const btn = document.getElementById(`speedBtn-${unitId}`);
  const cur = dialogSpeechRate[unitId] || 1.0;
  let newRate;
  if (cur === 1.0) {
    newRate = 1.4;
    dialogSpeechRate[unitId] = 1.4;
    btn.textContent = '🚀 快速 1.4x';
    btn.classList.add('active');
  } else {
    newRate = 1.0;
    dialogSpeechRate[unitId] = 1.0;
    btn.textContent = '🐢 常速 1.0x';
    btn.classList.remove('active');
  }
  // 实时切换：仅当播放的是对话音频时，立即改变播放速度
  if (currentAudio && isDialogAudio) {
    currentAudio.playbackRate = newRate;
  }
}

async function loadAudio(unitId) {
  if (audioCache[unitId]) return;
  // 优先从 audio_all.js 预加载数据（file:// 协议下 fetch 不可用）
  if (window.AD && window.AD[unitId]) {
    audioCache[unitId] = window.AD[unitId];
    return;
  }
  try {
    const resp = await fetch(`audio_data/audio_${unitId}.json`);
    if (resp.ok) {
      audioCache[unitId] = await resp.json();
    } else {
      audioCache[unitId] = {};
    }
  } catch(e) {
    console.warn(`Audio load failed for ${unitId}:`, e);
    audioCache[unitId] = {};
  }
}

// 后台逐个预加载单元音频，先加载的单元先可用（不等全部加载完）
let preloadTimer = null;

function startAudioPreload() {
  const ids = [];
  bookData.chapters.forEach(ch => ch.units.forEach(u => ids.push(u.id)));
  let idx = 0;

  function fetchNext() {
    if (idx >= ids.length) { preloadTimer = null; return; }
    const uid = ids[idx++];
    if (audioCache[uid]) { fetchNext(); return; } // 已经缓存，跳过

    // 优先 fetch 单个 JSON（快，~500KB/个）
    fetch(`audio_data/audio_${uid}.json`)
      .then(r => { if (r.ok) return r.json(); })
      .then(data => { if (data) audioCache[uid] = data; })
      .catch(() => {
        // fetch 失败（如 file:// 协议），回退到 window.AD
        if (window.AD && window.AD[uid]) audioCache[uid] = window.AD[uid];
      })
      .finally(() => setTimeout(fetchNext, 100)); // 100ms 间隔，进度更快
  }
  fetchNext();
}

// 页面完全加载后启动后台预加载
window.addEventListener('load', () => {
  setTimeout(startAudioPreload, 300);
});

function resetPlayButtons() {
  document.querySelectorAll('.vocab-item .play-icon, .sentence-item .s-play').forEach(el => {
    el.textContent = '▶';
    el.style.background = '';
    el.classList.remove('playing');
  });
  document.querySelectorAll('.dialogue-line .line-play').forEach(el => {
    el.textContent = '▶';
    el.style.background = '';
    el.classList.remove('playing');
  });
}

function stopSpeech() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if (playAllQueue) {
    clearTimeout(playAllQueue);
    playAllQueue = null;
  }
  isPlaying = false;
  isDialogAudio = false;
  activePlayBtn = null;
  document.querySelectorAll('.active-line').forEach(el => el.classList.remove('active-line'));
  document.querySelectorAll('.play-all.playing').forEach(el => {
    el.textContent = '🔊 播放全部';
    el.classList.remove('playing');
  });
  resetPlayButtons();
}

function setButtonPlaying(btnEl) {
  if (!btnEl) return;
  btnEl.textContent = '⏸';
  btnEl.style.background = '#CE2B37';
  btnEl.style.color = '#fff';
  btnEl.classList.add('playing');
  activePlayBtn = btnEl;
}

function playBase64Audio(base64data, callback, btnEl, highlightEl, rate) {
  if (!base64data) {
    if (callback) callback();
    return;
  }
  const audio = new Audio('data:audio/mp3;base64,' + base64data);
  audio.playbackRate = rate || 1.0;
  
  // Apply highlight when audio actually starts playing
  audio.onplay = () => {
    if (highlightEl) {
      document.querySelectorAll('.active-line').forEach(el => el.classList.remove('active-line'));
      highlightEl.classList.add('active-line');
    }
  };
  
  audio.onended = () => {
    currentAudio = null;
    isPlaying = false;
    if (activePlayBtn) {
      activePlayBtn.textContent = '▶';
      activePlayBtn.style.background = '';
      activePlayBtn.style.color = '';
      activePlayBtn.classList.remove('playing');
      activePlayBtn = null;
    }
    if (callback) callback();
  };
  audio.onerror = () => {
    currentAudio = null;
    isPlaying = false;
    if (activePlayBtn) {
      activePlayBtn.textContent = '▶';
      activePlayBtn.style.background = '';
      activePlayBtn.style.color = '';
      activePlayBtn.classList.remove('playing');
      activePlayBtn = null;
    }
    if (callback) callback();
  };
  currentAudio = audio;
  isPlaying = true;
  if (btnEl) setButtonPlaying(btnEl);
  audio.play().catch(() => {
    isPlaying = false;
    if (activePlayBtn) {
      activePlayBtn.textContent = '▶';
      activePlayBtn.style.background = '';
      activePlayBtn.style.color = '';
      activePlayBtn.classList.remove('playing');
      activePlayBtn = null;
    }
    if (callback) callback();
  });
}

async function speakWord(unitId, key, btnEl) {
  await loadAudio(unitId);
  const data = audioCache[unitId]?.[key];
  stopSpeech();
  isDialogAudio = false; // 生词/常用语不响应对话倍速
  playBase64Audio(data, null, btnEl);
}

async function speakLine(el, idx) {
  const unitId = el.dataset.unit;
  const unit = findUnit(unitId);
  if (!unit) return;
  const dialog = unit.dialogue[idx];
  if (!dialog) return;

  await loadAudio(unitId);
  const key = `d_${idx}`;
  const data = audioCache[unitId]?.[key];

  stopSpeech();
  document.querySelectorAll('.active-line').forEach(e => e.classList.remove('active-line'));
  el.classList.add('active-line');

  const btn = el.querySelector('.line-play');
  isDialogAudio = true; // 对话音频，响应实时变速
  const rate = dialogSpeechRate[unitId] || 1.0;
  playBase64Audio(data, () => {
    el.classList.remove('active-line');
  }, btn, null, rate);
}

async function playAll(unitId) {
  const unit = findUnit(unitId);
  if (!unit) return;
  const btn = document.getElementById(`playAll-${unitId}`);
  const progressFill = document.getElementById(`progress-${unitId}`);

  if (isPlaying) {
    stopSpeech();
    return;
  }

  await loadAudio(unitId);
  const lines = document.querySelectorAll(`#uc-${unitId} .dialogue-line`);
  let i = 0;

  btn.textContent = '⏸ 播放中...';
  btn.classList.add('playing');
  isDialogAudio = true; // 对话音频，响应实时变速

  function playNext() {
    if (i >= unit.dialogue.length) {
      stopSpeech();
      return;
    }
    // Highlight will be applied by playBase64Audio when audio actually starts

    const progress = ((i + 1) / unit.dialogue.length) * 100;
    progressFill.style.width = `${progress}%`;

    const key = `d_${i}`;
    const data = audioCache[unitId]?.[key];
    const rate = dialogSpeechRate[unitId] || 1.0;
    playBase64Audio(data, () => {
      i++;
      playAllQueue = setTimeout(playNext, 300);
    }, null, lines[i], rate);
  }
  playNext();
}

function findUnit(id) {
  for (const ch of bookData.chapters) {
    for (const u of ch.units) {
      if (u.id === id) return u;
    }
  }
  return null;
}

// ====== NAVIGATION ======
function openUnit(id) {
  // Hide all
  document.querySelectorAll('.unit-content').forEach(el => el.classList.remove('active'));
  document.getElementById('welcomePanel').style.display = 'none';

  // Show selected
  const target = document.getElementById(`uc-${id}`);
  if (target) {
    target.classList.add('active');
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Update TOC
  document.querySelectorAll('.unit-item').forEach(el => el.classList.remove('active'));
  const tocItem = document.querySelector(`[data-unit="${id}"]`);
  if (tocItem) {
    tocItem.classList.add('active');
    // Ensure parent chapter is expanded
    const chapter = tocItem.closest('.unit-list');
    if (chapter) chapter.classList.remove('collapsed');
    const title = chapter?.previousElementSibling;
    if (title) title.classList.remove('collapsed');
  }

  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

// Close sidebar when clicking overlay
document.getElementById('sidebarOverlay').onclick = toggleSidebar;

// ====== INIT ======
function init() {
  // 1. 立即渲染目录
  buildTOC();

  // 2. 下一帧构建单元内容（不阻塞目录显示）
  requestAnimationFrame(() => {
    const container = document.getElementById('unitContentContainer');
    let allHtml = '';
    bookData.chapters.forEach(ch => {
      ch.units.forEach(u => {
        allHtml += buildUnitContent(u);
      });
    });
    container.innerHTML = allHtml;

    // Expand first chapter by default
    const firstChapter = document.querySelector('.unit-list');
    if (firstChapter) {
      firstChapter.classList.remove('collapsed');
      const firstTitle = firstChapter.previousElementSibling;
      if (firstTitle) firstTitle.classList.remove('collapsed');
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
